version: "3.9"

services:
  api:
    build:
      context: .
      target: production
    container_name: sportshub_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/sportshub
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - BASE_URL=${BASE_URL:-http://localhost:5000}
    volumes:
      - uploads:/app/src/uploads
      - logs:/app/src/logs
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - sportshub_network

  mongo:
    image: mongo:7.0
    container_name: sportshub_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sportshub_network

volumes:
  mongo_data:
  uploads:
  logs:

networks:
  sportshub_network:
    driver: bridge
